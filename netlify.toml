[build]
  command = "npx playwright install chromium && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**"]

[build.environment]
  NODE_VERSION = "20"
  PLAYWRIGHT_BROWSERS_PATH = "0"

[[redirects]]
  from = "/api/ai-preprocess"
  to = "/.netlify/functions/ai-preprocess"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
