[build]
  command = "npx playwright install chromium && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**"]

[functions."ai-preprocess"]
  # 图生图轮询较慢；免费版上限 10s，Pro 可调至 26s
  timeout = 26

[functions."xhs-parse"]
  timeout = 26

[build.environment]
  NODE_VERSION = "20"
  PLAYWRIGHT_BROWSERS_PATH = "0"

[[headers]]
  for = "/watermark/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "same-origin"

[[redirects]]
  from = "/api/ai-preprocess"
  to = "/.netlify/functions/ai-preprocess"
  status = 200

[[redirects]]
  from = "/api/xhs-parse"
  to = "/.netlify/functions/xhs-parse"
  status = 200

[[redirects]]
  from = "/watermark/*"
  to = "https://dandan-watermark.netlify.app/watermark/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
